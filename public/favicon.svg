<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Tiny fried rice bowl favicon — the namesake piece as an icon -->
  <ellipse cx="16" cy="22" rx="13" ry="6" fill="#e8630a" stroke="#1a1a1a" stroke-width="0.5"/>
  <ellipse cx="16" cy="19" rx="13" ry="6" fill="#f0a0b0" stroke="#1a1a1a" stroke-width="0.5"/>
  <!-- rice -->
  <ellipse cx="11" cy="18" rx="2" ry="1" fill="#fffbe6" transform="rotate(-10 11 18)"/>
  <ellipse cx="16" cy="17" rx="2" ry="1" fill="#fffbe6" transform="rotate(8 16 17)"/>
  <ellipse cx="21" cy="18" rx="2" ry="1" fill="#fffbe6" transform="rotate(-5 21 18)"/>
  <ellipse cx="13" cy="19.5" rx="1.5" ry="0.8" fill="#fffbe6" transform="rotate(15 13 19.5)"/>
  <ellipse cx="19" cy="19.5" rx="1.5" ry="0.8" fill="#fffbe6" transform="rotate(-12 19 19.5)"/>
  <!-- green bits (peas/scallions) -->
  <circle cx="12" cy="16.5" r="1" fill="#7ec84c"/>
  <circle cx="18" cy="16" r="0.8" fill="#7ec84c"/>
  <circle cx="15" cy="19" r="0.7" fill="#7ec84c"/>
  <!-- sausage/dark bits -->
  <ellipse cx="14" cy="17.5" rx="1.5" ry="1" fill="#5a3520" transform="rotate(-20 14 17.5)"/>
  <ellipse cx="20" cy="17.5" rx="1.2" ry="0.8" fill="#5a3520" transform="rotate(15 20 17.5)"/>
  <!-- carrots -->
  <rect x="10" y="17" width="1.5" height="1.5" rx="0.3" fill="#e8630a" transform="rotate(10 10 17)"/>
  <rect x="17" y="18.5" width="1.2" height="1.2" rx="0.3" fill="#e8630a" transform="rotate(-8 17 18.5)"/>
  <!-- wooden spoon handle -->
  <line x1="8" y1="6" x2="14" y2="17" stroke="#c5903a" stroke-width="2" stroke-linecap="round"/>
</svg>
