<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
  <!-- A tiny fried rice bowl cursor -->
  <ellipse cx="12" cy="16" rx="10" ry="5" fill="#e8630a" stroke="#1a1a1a" stroke-width="1"/>
  <ellipse cx="12" cy="14" rx="10" ry="5" fill="#f5f0e8" stroke="#1a1a1a" stroke-width="1"/>
  <!-- rice grains -->
  <ellipse cx="8" cy="13" rx="1.5" ry="0.8" fill="#fffbe6" transform="rotate(-15 8 13)"/>
  <ellipse cx="12" cy="12.5" rx="1.5" ry="0.8" fill="#fffbe6" transform="rotate(10 12 12.5)"/>
  <ellipse cx="15" cy="13.2" rx="1.5" ry="0.8" fill="#fffbe6" transform="rotate(-5 15 13.2)"/>
  <ellipse cx="10" cy="14" rx="1.2" ry="0.7" fill="#fffbe6" transform="rotate(20 10 14)"/>
  <!-- green onion bits -->
  <circle cx="9" cy="12" r="0.7" fill="#7ec84c"/>
  <circle cx="14" cy="11.8" r="0.6" fill="#7ec84c"/>
  <circle cx="11" cy="13.5" r="0.5" fill="#7ec84c"/>
  <!-- egg bits -->
  <circle cx="13" cy="13" r="0.8" fill="#ffd700"/>
  <circle cx="7.5" cy="14" r="0.6" fill="#ffd700"/>
  <!-- chopsticks -->
  <line x1="6" y1="3" x2="11" y2="12" stroke="#c5371a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="8" y1="2" x2="13" y2="11.5" stroke="#c5371a" stroke-width="1.2" stroke-linecap="round"/>
</svg>
